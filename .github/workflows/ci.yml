name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-lint-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-lint-
            ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-typecheck-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-typecheck-
            ${{ runner.os }}-turbo-

      - name: Type check
        run: pnpm run typecheck

  unit-tests:
    name: Unit tests / ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Packages
            turbo-cache: unit-packages
            command: pnpm exec turbo run test --filter='!@codegraphy-dev/extension'
          - label: Extension node
            turbo-cache: unit-extension-node
            command: pnpm exec turbo run test:node --filter=@codegraphy-dev/extension
          - label: Extension webview graph interaction and rendering
            turbo-cache: unit-extension-webview-graph
            command: CODEGRAPHY_VITEST_WEBVIEW_GROUP=graph pnpm exec turbo run test:webview --filter=@codegraphy-dev/extension
          - label: Extension webview app shell and plugins
            turbo-cache: unit-extension-webview-app-plugins
            command: CODEGRAPHY_VITEST_WEBVIEW_GROUP=appPlugins pnpm exec turbo run test:webview --filter=@codegraphy-dev/extension
          - label: Extension webview panels, search, and exports
            turbo-cache: unit-extension-webview-panels-export
            command: CODEGRAPHY_VITEST_WEBVIEW_GROUP=panelsExport pnpm exec turbo run test:webview --filter=@codegraphy-dev/extension

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.turbo-cache }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.turbo-cache }}-
            ${{ runner.os }}-turbo-unit-
            ${{ runner.os }}-turbo-

      - name: Run ${{ matrix.label }}
        run: ${{ matrix.command }}

  release-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release contract tests
        run: pnpm run test:release

  vsix-artifact-tests:
    name: VSIX artifacts / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
          - target: darwin-arm64
            os: macos-14
          - target: win32-x64
            os: windows-2022
    env:
      CODEGRAPHY_VSIX_TARGETS: ${{ matrix.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package target VSIX artifacts
        run: pnpm run package:vsix

      - name: Validate VSIX native binaries
        run: pnpm run check:vsix-native-artifacts

      - name: Compile VS Code smoke tests
        run: pnpm --filter @codegraphy-dev/extension exec tsc -p src/e2e/tsconfig.json

      - name: Smoke installed VSIX activation
        if: runner.os != 'Linux'
        run: pnpm run check:vsix-activation

      - name: Smoke installed VSIX activation
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm run check:vsix-activation

  playwright:
    name: Playwright / ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Language examples
            suite: examples
            timeout-minutes: 15
          - label: Graph interactions
            suite: interactions
            timeout-minutes: 20
    env:
      CODEGRAPHY_VSCODE_PLAYWRIGHT_SUITE: ${{ matrix.suite }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-playwright-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-playwright-
            ${{ runner.os }}-turbo-

      - name: Check Playwright Turbo cache
        id: playwright-turbo-cache
        run: |
          node scripts/run-playwright-turbo.mjs --dry=json > turbo-playwright-dry-run.json
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const dryRun = JSON.parse(fs.readFileSync('turbo-playwright-dry-run.json', 'utf8'));
          const tasks = dryRun.tasks.filter((entry) => entry.task === 'test:playwright');
          const isHit = tasks.length > 0 && tasks.every((entry) => entry.cache?.status === 'HIT');
          console.log(`hit=${isHit ? 'true' : 'false'}`);
          NODE

      - name: Install Playwright browser + system deps
        if: steps.playwright-turbo-cache.outputs.hit != 'true'
        run: pnpm --filter @codegraphy-dev/extension exec playwright install --with-deps chromium

      - name: VS Code Playwright tests
        run: xvfb-run --auto-servernum node scripts/run-playwright-turbo.mjs

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-${{ matrix.suite }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright traces/videos
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results-${{ matrix.suite }}
          path: test-results/
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-

      - name: Build
        run: pnpm run build

  extension-native-runtime:
    name: Extension native runtime / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension host bundle
        run: pnpm --filter @codegraphy-dev/extension run build:extension

      - name: Load vendored native runtime
        run: pnpm --filter @codegraphy-dev/extension run check:native-runtime

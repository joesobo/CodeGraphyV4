packages:
  - "packages/*"
  - "apps/*"
  - "examples/*"
allowBuilds:
  '@driftlog/tree-sitter-dart': true
  '@ladybugdb/core': true
  '@tree-sitter-grammars/tree-sitter-kotlin': true
  '@tree-sitter-grammars/tree-sitter-lua': true
  '@vscode/vsce-sign': true
  esbuild: true
  keytar: true
  sharp: true
  tree-sitter: true
  tree-sitter-c: true
  tree-sitter-c-sharp: true
  tree-sitter-cli: true
  tree-sitter-cpp: true
  tree-sitter-go: true
  tree-sitter-haskell: true
  tree-sitter-java: true
  tree-sitter-javascript: true
  tree-sitter-objc: true
  tree-sitter-php: true
  tree-sitter-python: true
  tree-sitter-ruby: true
  tree-sitter-rust: true
  tree-sitter-scala: true
  tree-sitter-swift: true
  tree-sitter-typescript: true
minimumReleaseAgeExclude:
  - '@tailwindcss/node@4.3.2'
  - '@tailwindcss/oxide-android-arm64@4.3.2'
  - '@tailwindcss/oxide-darwin-arm64@4.3.2'
  - '@tailwindcss/oxide-darwin-x64@4.3.2'
  - '@tailwindcss/oxide-freebsd-x64@4.3.2'
  - '@tailwindcss/oxide-linux-arm-gnueabihf@4.3.2'
  - '@tailwindcss/oxide-linux-arm64-gnu@4.3.2'
  - '@tailwindcss/oxide-linux-arm64-musl@4.3.2'
  - '@tailwindcss/oxide-linux-x64-gnu@4.3.2'
  - '@tailwindcss/oxide-linux-x64-musl@4.3.2'
  - '@tailwindcss/oxide-wasm32-wasi@4.3.2'
  - '@tailwindcss/oxide-win32-arm64-msvc@4.3.2'
  - '@tailwindcss/oxide-win32-x64-msvc@4.3.2'
  - '@tailwindcss/oxide@4.3.2'
  - '@tailwindcss/postcss@4.3.2'
  - tailwindcss@4.3.2
  - '@turbo/darwin-64@2.10.1'
  - '@turbo/darwin-arm64@2.10.1'
  - '@turbo/linux-64@2.10.1'
  - '@turbo/linux-arm64@2.10.1'
  - '@turbo/windows-64@2.10.1'
  - '@turbo/windows-arm64@2.10.1'
  - turbo@2.10.1
overrides:
  "ajv>fast-uri": "3.1.2"
  "hono@<4.12.21": "4.12.25"
  "ip-address@<=10.1.0": "10.2.0"
  "lodash-es@>=4.0.0 <=4.17.23": "4.18.1"
  "picomatch@>=4.0.0 <4.0.4": "4.0.4"
  "postcss@<8.5.10": "8.5.15"
  "qs@>=6.11.1 <=6.15.1": "6.15.2"
  "yaml@>=2.0.0 <2.8.3": "2.8.3"
packageExtensions:
  "react-force-graph-2d@*":
    dependencies:
      "@types/react": "^18.2.48"
  "react-force-graph-3d@*":
    dependencies:
      "@types/react": "^18.2.48"
patchedDependencies:
  tree-sitter@0.25.0: patches/tree-sitter@0.25.0.patch

name: Mutation Seed

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-seed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-seed-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      jobs: ${{ steps.jobs.outputs.jobs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Discover mutation seed jobs
        id: jobs
        run: |
          jobs="$(pnpm exec tsx scripts/mutation/listSeedJobs.ts --json)"
          echo "jobs=${jobs}" >> "$GITHUB_OUTPUT"
          echo "Mutation seed jobs: ${jobs}"

  seed-package:
    name: Mutation seed / ${{ matrix.package }} / ${{ matrix.shard }}
    needs: discover-seed-jobs
    runs-on: ubuntu-latest
    # GitHub-hosted runners cap job execution at 6h. Split long mutation
    # targets or move this job to self-hosted infrastructure before raising it.
    timeout-minutes: 360
    if: ${{ needs.discover-seed-jobs.outputs.jobs != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-seed-jobs.outputs.jobs) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore package mutation seed cache
        uses: actions/cache@v5
        with:
          path: reports/quality-tools/mutation/${{ matrix.package }}
          key: ${{ runner.os }}-mutation-seed-${{ matrix.package }}-${{ matrix.shard }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-mutation-seed-${{ matrix.package }}-${{ matrix.shard }}-

      - name: Refresh ${{ matrix.package }} / ${{ matrix.shard }} mutation seed
        run: pnpm exec tsx scripts/mutation/runSeedJob.ts --package "${{ matrix.package }}" --shard "${{ matrix.shard }}"

      - name: Verify ${{ matrix.package }} incremental report exists
        run: test -f "reports/quality-tools/mutation/${{ matrix.package }}/stryker-incremental-${{ matrix.package }}.json"

      - name: Upload ${{ matrix.package }} / ${{ matrix.shard }} mutation seed
        uses: actions/upload-artifact@v6
        with:
          name: mutation-seed-${{ matrix.package }}-${{ matrix.shard }}
          path: reports/quality-tools/mutation/${{ matrix.package }}/stryker-incremental-${{ matrix.package }}.json
          if-no-files-found: error
          retention-days: 14

  assemble-seed:
    name: Assemble mutation seed
    needs: seed-package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download package mutation seeds
        uses: actions/download-artifact@v7
        with:
          pattern: mutation-seed-*
          path: package-seeds

      - name: Assemble main mutation seed artifact
        run: |
          pnpm exec tsx scripts/mutation/assembleSeed.ts --input package-seeds --output reports/quality-tools/mutation --sha "${GITHUB_SHA}"
          find reports/quality-tools/mutation -type f | sort

      - name: Upload main mutation seed
        uses: actions/upload-artifact@v6
        with:
          name: main-mutation-seed
          path: |
            reports/quality-tools/mutation/seed-sha.txt
            reports/quality-tools/mutation/*/stryker-incremental-*.json
          if-no-files-found: error
          retention-days: 14

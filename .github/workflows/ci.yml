name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-lint-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-lint-
            ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-typecheck-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-typecheck-
            ${{ runner.os }}-turbo-

      - name: Type check
        run: pnpm run typecheck

  unit-tests:
    name: Unit tests / ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Packages
            turbo-cache: unit-packages
            command: pnpm exec turbo run test --filter='!@codegraphy-dev/extension'
          - label: Extension node
            turbo-cache: unit-extension-node
            command: pnpm exec turbo run test:node --filter=@codegraphy-dev/extension
          - label: Extension webview graph interaction and rendering
            turbo-cache: unit-extension-webview-graph
            command: CODEGRAPHY_VITEST_WEBVIEW_GROUP=graph pnpm exec turbo run test:webview --filter=@codegraphy-dev/extension
          - label: Extension webview app shell and plugins
            turbo-cache: unit-extension-webview-app-plugins
            command: CODEGRAPHY_VITEST_WEBVIEW_GROUP=appPlugins pnpm exec turbo run test:webview --filter=@codegraphy-dev/extension
          - label: Extension webview panels, search, and exports
            turbo-cache: unit-extension-webview-panels-export
            command: CODEGRAPHY_VITEST_WEBVIEW_GROUP=panelsExport pnpm exec turbo run test:webview --filter=@codegraphy-dev/extension

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.turbo-cache }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.turbo-cache }}-
            ${{ runner.os }}-turbo-unit-
            ${{ runner.os }}-turbo-

      - name: Run ${{ matrix.label }}
        run: ${{ matrix.command }}

  release-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release contract tests
        run: pnpm run test:release

  vsix-artifact-tests:
    name: VSIX artifacts / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
          - target: darwin-arm64
            os: macos-14
          - target: win32-x64
            os: windows-2022
    env:
      CODEGRAPHY_VSIX_TARGETS: ${{ matrix.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package target VSIX artifacts
        run: pnpm run package:vsix

      - name: Validate VSIX native binaries
        run: pnpm run check:vsix-native-artifacts

      - name: Compile VS Code smoke tests
        run: pnpm --filter @codegraphy-dev/extension exec tsc -p src/e2e/tsconfig.json

      - name: Smoke installed VSIX activation
        if: runner.os != 'Linux'
        run: pnpm run check:vsix-activation

      - name: Smoke installed VSIX activation
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm run check:vsix-activation

  playwright:
    name: Playwright / ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Language examples - C family and Dart
            suite: examples
            timeout-minutes: 15
            grep: 'C\+\+ Example|(^|[^-])C Example|C# Example|Dart Example'
            artifact-suffix: examples-c-family-dart
            workers: 1
          - label: Language examples - Go, Godot, Haskell, and Unity
            suite: examples
            timeout-minutes: 15
            grep: 'Go Example|Godot Example|Haskell Example|Unity Example'
            artifact-suffix: examples-go-godot-haskell
            workers: 1
          - label: Language examples - Java
            suite: examples
            timeout-minutes: 15
            grep: 'Java Example'
            artifact-suffix: examples-java
            workers: 1
          - label: Language examples - JavaScript
            suite: examples
            timeout-minutes: 15
            grep: 'JavaScript Example'
            artifact-suffix: examples-javascript
            workers: 1
          - label: Language examples - Kotlin
            suite: examples
            timeout-minutes: 15
            grep: 'Kotlin Example'
            artifact-suffix: examples-kotlin
            workers: 1
          - label: Language examples - Lua, Markdown, and Objective-C
            suite: examples
            timeout-minutes: 15
            grep: 'Lua Example|Markdown Example|Objective-C Example'
            artifact-suffix: examples-lua-markdown-objective-c
            workers: 1
          - label: Language examples - Pascal
            suite: examples
            timeout-minutes: 15
            grep: 'Pascal Example'
            artifact-suffix: examples-pascal
            workers: 1
          - label: Language examples - PHP
            suite: examples
            timeout-minutes: 15
            grep: 'PHP Example'
            artifact-suffix: examples-php
            workers: 1
          - label: Language examples - Python
            suite: examples
            timeout-minutes: 15
            grep: 'Python Example'
            artifact-suffix: examples-python
            workers: 1
          - label: Language examples - Ruby, Rust, and Scala
            suite: examples
            timeout-minutes: 15
            grep: 'Ruby Example|Rust Example|Scala Example'
            artifact-suffix: examples-ruby-rust-scala
            workers: 1
          - label: Language examples - Svelte, Swift, and TypeScript
            suite: examples
            timeout-minutes: 15
            grep: 'Svelte Example|Swift Example|TypeScript Example'
            artifact-suffix: examples-svelte-swift-typescript
            workers: 1
          - label: Language examples - Vue
            suite: examples
            timeout-minutes: 15
            grep: 'Vue Example'
            artifact-suffix: examples-vue
            workers: 1
          - label: Graph interactions - canvas basics and favorites
            suite: interactions
            timeout-minutes: 20
            grep: 'Background Context Menu|Dragging|Edge Context Menu|Favorite'
            artifact-suffix: interactions-canvas-basics-favorites
            workers: 1
          - label: Graph interactions - files, folders, and rendering
            suite: interactions
            timeout-minutes: 20
            grep: 'File Context Menu|Folder Context Menu|Graph Navigation|Graph Rendering'
            artifact-suffix: interactions-files-folders-rendering
            workers: 1
          - label: Graph scope - edge types
            suite: interactions
            timeout-minutes: 20
            grep: 'Graph Scope Edge Types'
            artifact-suffix: scope-edge-types
            workers: 1
          - label: Graph scope - core node types
            suite: interactions
            timeout-minutes: 20
            grep: 'Graph Scope Node Types.*\b(File|Folder|Package|Symbol|Namespace|Function|Prototype|Class)\b node type|Graph Scope Node Types - TypeScript TypeScript plugin node types show symbols'
            artifact-suffix: scope-core-node-types
            workers: 1
          - label: Graph scope - contract and member node types
            suite: interactions
            timeout-minutes: 20
            grep: 'Graph Scope Node Types.*\b(Interface|Type|Struct|Union|Enum|Typedef|Callable|Method|Alias|Record|Delegate|Constructor|Property|Event)\b node type'
            artifact-suffix: scope-contract-member-node-types
            workers: 1
          - label: Graph scope - value nodes and view modes
            suite: interactions
            timeout-minutes: 20
            grep: 'Graph Scope Node Types.*\b(Template|Variable|Global|Constant|Field|Parameter|Local|Godot class_name|Scene|Resource|Autoload|Scene Node|Signal)\b node type|Graph Theme'
            artifact-suffix: scope-value-nodes-view-modes
            workers: 1
          - label: Graph interactions - hover and selection
            suite: interactions
            timeout-minutes: 20
            grep: 'Hover|Multi File Node Context Menu|Selection'
            artifact-suffix: interactions-hover-selection
            workers: 1
          - label: Graph interactions - startup and ignored files
            suite: interactions
            timeout-minutes: 20
            grep: 'Graph View'
            artifact-suffix: interactions-startup-ignored-files
            workers: 1
    env:
      CODEGRAPHY_VSCODE_PLAYWRIGHT_SUITE: ${{ matrix.suite }}
      CODEGRAPHY_VSCODE_PLAYWRIGHT_GREP: ${{ matrix.grep }}
      CODEGRAPHY_VSCODE_PLAYWRIGHT_WORKERS: ${{ matrix.workers }}
      CODEGRAPHY_VSCODE_TEST_VERSION: 1.125.1

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute Playwright Turbo cache key
        id: playwright-turbo-key
        run: |
          node scripts/run-playwright-turbo.mjs --dry=json > turbo-playwright-dry-run.json
          node scripts/playwright-turbo-cache.mjs key turbo-playwright-dry-run.json

      - name: Restore Turbo cache
        id: playwright-turbo-cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-playwright-${{ matrix.artifact-suffix }}-${{ steps.playwright-turbo-key.outputs.hash }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-turbo-playwright-${{ matrix.artifact-suffix }}-${{ steps.playwright-turbo-key.outputs.hash }}-
            ${{ runner.os }}-turbo-playwright-${{ matrix.artifact-suffix }}-
            ${{ runner.os }}-turbo-build-

      - name: Check Playwright Turbo cache
        id: playwright-turbo-status
        run: |
          node scripts/run-playwright-turbo.mjs --dry=json > turbo-playwright-restored-dry-run.json
          node scripts/playwright-turbo-cache.mjs status turbo-playwright-restored-dry-run.json

      - name: Restore VS Code test host cache
        if: steps.playwright-turbo-status.outputs.cached != 'true'
        uses: actions/cache@v5
        with:
          path: packages/extension/.vscode-test
          key: ${{ runner.os }}-vscode-test-host-${{ env.CODEGRAPHY_VSCODE_TEST_VERSION }}
          restore-keys: |
            ${{ runner.os }}-vscode-test-host-

      - name: Install VS Code test host
        if: steps.playwright-turbo-status.outputs.cached != 'true'
        working-directory: packages/extension
        run: |
          node --input-type=module <<'NODE'
          import { downloadAndUnzipVSCode } from '@vscode/test-electron';

          await downloadAndUnzipVSCode({
            version: process.env.CODEGRAPHY_VSCODE_TEST_VERSION,
            cachePath: '.vscode-test',
          });
          NODE

      - name: VS Code Playwright tests
        run: xvfb-run --auto-servernum node scripts/run-playwright-turbo.mjs

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-${{ matrix.artifact-suffix }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright traces/videos
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results-${{ matrix.artifact-suffix }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-

      - name: Build
        run: pnpm run build

  extension-native-runtime:
    name: Extension native runtime / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension host bundle
        run: pnpm --filter @codegraphy-dev/extension run build:extension

      - name: Load vendored native runtime
        run: pnpm --filter @codegraphy-dev/extension run check:native-runtime
